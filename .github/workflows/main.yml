name: Deploy to GitHub Pages

on:
  push:
    branches: "main"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Static Production Bundle
        run: bun run build
        env:
          VITE_APP_BASE_PATH: /portfolio/
          NITRO_PRESET: static

      - name: Fix for GitHub Pages (SPA Routing & Assets)
        run: |
          mkdir -p final_dist
          # 1. Framework compiles static assets into .output/public for Vinxi Static Preset
          if [ -d ".output/public" ]; then
            cp -r .output/public/* final_dist/
          elif [ -d "dist/client" ]; then
            cp -r dist/client/* final_dist/
          elif [ -d "dist" ]; then
            cp -r dist/* final_dist/
          fi
          
          # 2. Prevent GitHub Pages Jekyll from blocking underscore folders (_chunks, _assets)
          touch final_dist/.nojekyll
          
          # 3. Create fallback for client-side routing to avoid 404 on refresh
          cp final_dist/index.html final_dist/404.html || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./final_dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
