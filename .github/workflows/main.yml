name: Deploy to GitHub Pages

on:
  push:
    branches: "main"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Static SPA
        run: bun run build
        env:
          VITE_APP_BASE_PATH: /portfolio/
          NITRO_PRESET: github-pages

      - name: Fix for GitHub Pages (SPA Routing)
        run: |
          if [ -d "dist/client" ]; then
            cp dist/client/index.html dist/client/404.html
          elif [ -d "dist" ]; then
            cp dist/index.html dist/404.html
          elif [ -d ".output/public" ]; then
            cp .output/public/index.html .output/public/404.html
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            dist/client
            dist
            .output/public
          if-no-files-found: error

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
