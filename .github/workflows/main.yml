name: Deploy to GitHub Pages

on:
  push:
    branches: "main"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Static Production Bundle
        run: bunx vinxi build
        env:
          VITE_APP_BASE_PATH: /portfolio/

      - name: Fix for GitHub Pages (SPA Routing)
        run: |
          mkdir -p .output/public
          if [ -d "dist/client" ]; then
            cp -r dist/client/* .output/public/ || true
          elif [ -d "dist" ]; then
            cp -r dist/* .output/public/ || true
          fi
          cp .output/public/index.html .output/public/404.html || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
