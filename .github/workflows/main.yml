name: Deploy to GitHub Pages

on:
  push:
    branches: "main"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Pure SPA Static Site
        run: bun run build
        env:
          VITE_APP_BASE_PATH: /portfolio/
          NITRO_PRESET: github-pages

      - name: Force Harvest Static Assets
        run: |
          mkdir -p final_dist
          # Pull assets from whichever directory Vinxi dumped them into
          if [ -d ".output/public" ]; then
            cp -r .output/public/* final_dist/
          elif [ -d "dist/client" ]; then
            cp -r dist/client/* final_dist/
          elif [ -d "dist" ]; then
            cp -r dist/* final_dist/
          fi
          
          # Inject bypass for Jekyll and add dynamic SPA routing fallbacks
          touch final_dist/.nojekyll
          cp final_dist/index.html final_dist/404.html || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./final_dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
